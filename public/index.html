<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream | Secure Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #111;
            color: #fff;
            line-height: 1.6;
        }

        header {
            background-color: #000;
            padding: 1rem 2rem;
            border-bottom: 2px solid #e50914;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #e50914;
            text-transform: uppercase;
        }

        /* Responsive Video Theater Module */
        .theater-zone {
            max-width: 1100px;
            margin: 2rem auto 0 auto;
            padding: 0 2rem;
            display: none;
        }

        .video-box {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 widescreen mapping */
            height: 0;
            background: #000;
            border: 2px solid #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .close-screen {
            background: #e50914;
            color: #fff;
            border: none;
            padding: 8px 18px;
            margin-bottom: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-heading {
            font-size: 1.6rem;
            margin: 2rem 0 1rem 0;
            border-left: 4px solid #e50914;
            padding-left: 12px;
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 22px;
        }

        .movie-card {
            background-color: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid #252525;
        }

        .movie-card:hover {
            transform: scale(1.04);
            border-color: #e50914;
        }

        .movie-card img {
            width: 100%;
            height: 255px;
            object-fit: cover;
        }

        .movie-card-title {
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">CineStream</div>
    </header>

    <div class="theater-zone" id="theaterModule">
        <button class="close-screen" onclick="shutdownTheater()">✕ Close Player</button>
        <div class="video-box">
            <iframe id="streamScreen" src="" allowfullscreen></iframe>
        </div>
    </div>

    <main class="container">
        <h2 class="section-heading">Trending Movies</h2>
        <div class="showcase-grid" id="moviesShelf"></div>

        <h2 class="section-heading">Popular TV Shows</h2>
        <div class="showcase-grid" id="showsShelf"></div>
    </main>

    <script>
        let videasyBaseUrl = "";

        // Run as soon as the window loads up
        document.addEventListener('DOMContentLoaded', async () => {
            await loadConfig();
            loadGallery('/api/trending/movies', 'moviesShelf', 'movie');
            loadGallery('/api/trending/shows', 'showsShelf', 'tv');
        });

        // Request non-sensitive configurations from backend
        async function loadConfig() {
            const res = await fetch('/api/config');
            const config = await res.json();
            videasyBaseUrl = config.videasyUrl;
        }

        // Fetch data through our backend bridge
        async function loadGallery(apiEndpoint, targetDomId, streamType) {
            const container = document.getElementById(targetDomId);
            try {
                const response = await fetch(apiEndpoint);
                const catalog = await response.json();
                
                container.innerHTML = '';
                
                catalog.results.slice(0, 12).forEach(item => {
                    const titleName = item.title || item.name;
                    const banner = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
                    
                    const block = document.createElement('div');
                    block.className = 'movie-card';
                    block.onclick = () => ignitePlayer(streamType, item.id);
                    
                    block.innerHTML = `
                        <img src="${banner}" alt="Media Poster" loading="lazy">
                        <div class="movie-card-title" title="${titleName}">${titleName}</div>
                    `;
                    container.appendChild(block);
                });
            } catch (err) {
                container.innerHTML = `<p style="color:#666;">Failed to load assets.</p>`;
            }
        }

        function ignitePlayer(category, identifier) {
            const theater = document.getElementById('theaterModule');
            const targetScreen = document.getElementById('streamScreen');
            
            let streamPath = (category === 'movie') 
                ? `${videasyBaseUrl}/movie/${identifier}`
                : `${videasyBaseUrl}/tv/${identifier}/1/1`;

            targetScreen.src = streamPath;
            theater.style.display = 'block';
            theater.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function shutdownTheater() {
            document.getElementById('theaterModule').style.display = 'none';
            document.getElementById('streamScreen').src = ''; 
        }
    </script>
</body>
</html>
