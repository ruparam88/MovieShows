<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream | Movies & TV Shows</title>
    <style>
        /* Modern Dark Theme Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #111;
            color: #fff;
            line-height: 1.6;
        }

        /* Header / Navbar Style */
        header {
            background-color: #000;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e50914; 
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #e50914;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* Video Player Modal Section */
        .player-container {
            max-width: 1000px;
            margin: 2rem auto 0 auto;
            padding: 0 2rem;
            display: none; /* Hidden until a card is clicked */
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .close-player {
            background: #e50914;
            color: #fff;
            border: none;
            padding: 8px 16px;
            margin-bottom: 10px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        /* Hero / Welcome Section */
        .hero {
            text-align: center;
            padding: 5rem 2rem;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(17,17,17,1)), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1920') no-repeat center center/cover;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 600px;
            margin: 0 auto 2rem auto;
        }

        /* Content Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #e50914;
            padding-left: 10px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 3rem;
        }

        .card {
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 1px solid #333;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.2);
            border-color: #e50914;
        }

        .card img {
            width: 100%;
            height: 270px;
            object-fit: cover;
            background-color: #333;
        }

        .card-info {
            padding: 12px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-type {
            font-size: 0.75rem;
            color: #e50914;
            text-transform: uppercase;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 2rem;
            background-color: #000;
            color: #555;
            font-size: 0.9rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">CineStream</div>
    </header>

    <div class="player-container" id="playerContainer">
        <button class="close-player" onclick="closePlayer()">✕ Close Player</button>
        <div class="video-wrapper">
            <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        </div>
    </div>

    <section class="hero">
        <h1>Unlimited Movies & TV Shows</h1>
        <p>Click any title below to instantly stream via Videasy embeds.</p>
    </section>

    <main class="container">
        
        <h2 class="section-title">Trending Movies</h2>
        <div class="grid" id="moviesGrid">
            </div>

        <h2 class="section-title">Popular TV Shows</h2>
        <div class="grid" id="showsGrid">
            </div>

    </main>

    <footer>
        <p>&copy; 2026 CineStream. Powered by TMDB Data.</p>
    </footer>

    <script>
        // Your Verified Credentials securely passed via standard API parameters
        const API_KEY = 'c4b037a019ec2854a8beaad69d5a9611';
        const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/w500';

        // Videasy Base Structure (adjust folder structure if videasy.to uses alternate patterns like /embed/movie/)
        const VIDEASY_BASE_URL = 'https://videasy.to/embed'; 

        // Fetch Data on page load
        document.addEventListener('DOMContentLoaded', () => {
            fetchTrendingMovies();
            fetchPopularShows();
        });

        // 1. Get Trending Movies from TMDB
        async function fetchTrendingMovies() {
            try {
                const response = await fetch(`${TMDB_BASE_URL}/trending/movie/week?api_key=${API_KEY}`);
                const data = await response.json();
                renderCards(data.results, 'moviesGrid', 'movie');
            } catch (error) {
                console.error("Error fetching movies:", error);
            }
        }

        // 2. Get Popular TV Shows from TMDB
        async function fetchPopularShows() {
            try {
                const response = await fetch(`${TMDB_BASE_URL}/tv/popular?api_key=${API_KEY}`);
                const data = await response.json();
                renderCards(data.results, 'showsGrid', 'tv');
            } catch (error) {
                console.error("Error fetching shows:", error);
            }
        }

        // 3. Build UI elements with active TMDB metadata 
        function renderCards(items, gridId, type) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = ''; // Clear placeholders

            items.forEach(item => {
                const title = item.title || item.name;
                const releaseDate = item.release_date || item.first_air_date;
                const posterPath = item.poster_path ? `${IMAGE_BASE_URL}${item.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Poster';
                
                const card = document.createElement('div');
                card.className = 'card';
                // Attach click behavior targeting your Videasy route structure
                card.onclick = () => launchPlayer(type, item.id);

                card.innerHTML = `
                    <img src="${posterPath}" alt="${title}" loading="lazy">
                    <div class="card-info">
                        <span class="card-type">${type === 'movie' ? 'Movie' : 'TV Show'}</span>
                        <div class="card-title" title="${title}">${title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 4. Handle stream launch inside player container
        function launchPlayer(type, tmdbId) {
            const playerContainer = document.getElementById('playerContainer');
            const iframe = document.getElementById('videoPlayer');
            
            // Constructs default patterns: videasy.to/embed/movie/ID or videasy.to/embed/tv/ID/1/1
            let embedUrl = "";
            if (type === 'movie') {
                embedUrl = `${VIDEASY_BASE_URL}/movie/${tmdbId}`;
            } else {
                // TV defaults to Season 1, Episode 1. Can expand logic if needed later
                embedUrl = `${VIDEASY_BASE_URL}/tv/${tmdbId}/1/1`;
            }

            iframe.src = embedUrl;
            playerContainer.style.display = 'block';
            
            // Scroll smoothly up to view video panel
            playerContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function closePlayer() {
            const playerContainer = document.getElementById('playerContainer');
            const iframe = document.getElementById('videoPlayer');
            iframe.src = ""; // Kill playback process
            playerContainer.style.display = 'none';
        }
    </script>
</body>
</html>
